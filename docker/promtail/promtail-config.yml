server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3101/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
    - targets:
        - localhost
      labels:
        job: varlogs
        __path__: /var/log/*log

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Совпадает с PRD 002 / ASSIGNMENT: запрос Loki `{app="signal-lab"}` для backend
      - source_labels: ['__meta_docker_container_name']
        regex: '/signal-lab-backend'
        target_label: 'app'
        replacement: 'signal-lab'
